<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <title>Youtube Clone</title>
    <link rel="stylesheet" href="styles.css">
    <script  type="module" src="main.js"></script>
  </head>
  <body>
    <header>
      <img
        class="youtube-logo"
        src="/icons/header/youtube-logo.svg"
        alt="youtube-logo"
      >
      <div class="search">
        <input type="text" placeholder="Search">
        <button>
          <img src="/icons/header/search.svg" alt="search">
        </button>
        <button class="voice-search">
          <img src="/icons/header/voice-search-icon.svg">
        </button>
      </div>
      <div class="actions">
        <div class="upload">
          <img src="/icons/header/upload.svg" alt="upload">
        </div>
        <div class="youtube-apps">
          <img src="/icons/header/youtube-apps.svg" alt="youtube-apps">
        </div>
        <div class="notifications">
          <img src="/icons/header/notifications.svg" alt="notifications">
          <div class="counter">3</div>
        </div>
        <div class="my-channel">
          <img src="/icons/channels/my-channel.jpg" alt="my-channel">
        </div>
      </div>
    </header>
    <nav class="sidebar"></nav>
  </body>
</html>
