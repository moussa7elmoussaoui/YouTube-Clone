<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <title>Youtube Clone</title>
    <link rel="stylesheet" href="styles.css">
    <script  type="module" src="main.js"></script>
  </head>
  <body>
    <header>
      <img class="youtube-logo" src="assets/icons/header/youtube-logo.svg">
      <div class="search">
        <input type="text" placeholder="Search">
        <button>
          <img src="assets/icons/header/search.svg">
        </button>
        <button class="voice-search">
          <img src="assets/icons/header/voice-search-icon.svg">
        </button>
      </div>
      <div class="actions">
        <div class="upload">
          <img src="assets/icons/header/upload.svg">
        </div>
        <div class="youtube-apps">
          <img src="assets/icons/header/youtube-apps.svg">
        </div>
        <div class="notifications">
          <img src="assets/icons/header/notifications.svg">
          <div class="counter">3</div>
        </div>
        <div class="my-channel">
          <img src="assets/images/channels/my-channel.jpg">
        </div>
      </div>
    </header>
    <nav class="sidebar">
      <button class="hamburger-menu">
        <img src="assets/icons/sidebar/hamburger-menu.svg">
      </button>
      <button class="home">
        <img src="assets/icons/sidebar/home.svg">
        <span>Home</span>
      </button>
      <button class="explore">
        <img src="assets/icons/sidebar/explore.svg">
        <span>Explore</span>
      </button>
      <button class="subscriptions">
        <img src="assets/icons/sidebar/subscriptions.svg">
        <span>Subscriptions</span>
      </button>
      <button class="originals">
        <img src="assets/icons/sidebar/originals.svg">
        <span>Originals</span>
      </button>
      <button class="youtube-music">
        <img src="assets/icons/sidebar/youtube-music.svg">
        <span>Youtube Music</span>
      </button>
      <button class="library">
        <img src="assets/icons/sidebar/library.svg">
        <span>Library</span>
      </button>
    </nav>
    <main>
      <!--Previews-->
    </main>
  </body>
</html>
