<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <title>Youtube Clone</title>
    <link rel="stylesheet" href="styles.css">
    <script  type="module" src="main.js"></script>
  </head>
  <body>
    <header>
      <img
        class="youtube-logo"
        src="assets/icons/header/youtube-logo.svg"
        alt="youtube-logo"
      >
      <div class="search">
        <input type="text" placeholder="Search">
        <button>
          <img src="assets/icons/header/search.svg" alt="search">
        </button>
        <button class="voice-search">
          <img src="assets/icons/header/voice-search-icon.svg">
        </button>
      </div>
      <div class="actions">
        <div class="upload">
          <img src="assets/icons/header/upload.svg" alt="upload">
        </div>
        <div class="youtube-apps">
          <img src="assets/icons/header/youtube-apps.svg" alt="youtube-apps">
        </div>
        <div class="notifications">
          <img src="assets/icons/header/notifications.svg" alt="notifications">
          <div class="counter">3</div>
        </div>
        <div class="my-channel">
          <img src="assets/images/channels/my-channel.jpg" alt="my-channel">
        </div>
      </div>
    </header>
    <nav class="sidebar">
      <button class="hamburger-menu">
        <img src="assets/icons/sidebar/hamburger-menu.svg" alt="hamburger-menu">
      </button>
      <button class="home">
        <img src="assets/icons/sidebar/home.svg" alt="home">
        <span>Home</span>
      </button>
      <button class="explore">
        <img src="assets/icons/sidebar/explore.svg" alt="explore">
        <span>Explore</span>
      </button>
      <button class="subscriptions">
        <img src="assets/icons/sidebar/subscriptions.svg" alt="subscriptions">
        <span>Subscriptions</span>
      </button>
      <button class="originals">
        <img src="assets/icons/sidebar/originals.svg" alt="originals">
        <span>Originals</span>
      </button>
      <button class="youtube-music">
        <img src="assets/icons/sidebar/youtube-music.svg" alt="youtube-music">
        <span>Youtube Music</span>
      </button>
      <button class="library">
        <img src="assets/icons/sidebar/library.svg" alt="library">
        <span>Library</span>
      </button>
    </nav>
    <main>
      
    </main>
  </body>
</html>
